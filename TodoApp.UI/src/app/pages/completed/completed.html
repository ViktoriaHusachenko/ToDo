<div class="page-header d-flex align-items-center gap-2 mb-4">
    <span class="material-symbols-outlined page-icon completed-icon">task_alt</span>
    <h1 class="h4 mb-0">Виконані</h1>
</div>

@if (isLoading()) {
<div class="text-center text-muted py-5">Завантаження...</div>
} @else if (completedTasks().length === 0) {
<div class="empty-state text-center text-muted py-5">
    <span class="material-symbols-outlined empty-icon">check_circle</span>
    <p class="mt-2 mb-0">Ще немає виконаних задач.</p>
</div>
} @else {
@for (task of completedTasks(); track task.id) {
<app-task-item [task]="task" [isImportant]="isImportant(task.id)" (toggleComplete)="onToggleComplete(task)"
    (toggleImportant)="onToggleImportant(task.id)" (deleteTask)="onDelete(task.id)" />
}
}
