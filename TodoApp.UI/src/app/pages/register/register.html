<div class="auth-page">
    <div class="auth-card card">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <span class="material-symbols-outlined auth-logo">check_circle</span>
                <h1 class="h4 fw-semibold mt-2 mb-0">TodoApp</h1>
                <p class="text-muted small">Створіть новий акаунт</p>
            </div>

            <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
                <div class="mb-3">
                    <label class="form-label" for="displayName">Ім'я</label>
                    <input id="displayName" type="text" class="form-control" formControlName="displayName"
                        [class.is-invalid]="form.controls.displayName.invalid && form.controls.displayName.touched" />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="email">Email</label>
                    <input id="email" type="email" class="form-control" formControlName="email"
                        [class.is-invalid]="form.controls.email.invalid && form.controls.email.touched"
                        autocomplete="email" />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="password">Пароль</label>
                    <input id="password" type="password" class="form-control" formControlName="password"
                        [class.is-invalid]="form.controls.password.invalid && form.controls.password.touched"
                        autocomplete="new-password" />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="confirmPassword">Підтвердження пароля</label>
                    <input id="confirmPassword" type="password" class="form-control" formControlName="confirmPassword"
                        [class.is-invalid]="form.errors?.['passwordsMismatch'] && form.controls.confirmPassword.touched"
                        autocomplete="new-password" />
                    <div class="invalid-feedback">Паролі не збігаються.</div>
                </div>

                @if (errorMessage()) {
                <div class="alert alert-danger py-2 small">{{ errorMessage() }}</div>
                }

                <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading()">
                    @if (isLoading()) { <span class="spinner-border spinner-border-sm me-2"></span> }
                    Зареєструватися
                </button>
            </form>

            <p class="text-center small text-muted mt-4 mb-0">
                Вже є акаунт? <a routerLink="/login">Увійти</a>
            </p>
        </div>
    </div>
</div>
