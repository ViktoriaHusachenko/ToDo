<aside class="app-sidebar d-flex flex-column">
    <div class="sidebar-brand px-3 py-3">
        <span class="material-symbols-outlined">check_circle</span>
        <span class="brand-text">TodoApp</span>
    </div>

    <nav class="sidebar-nav flex-grow-1">
        <a routerLink="/tasks" [queryParams]="{ view: 'today' }" routerLinkActive="active" class="nav-link">
            <span class="material-symbols-outlined">wb_sunny</span>
            <span>Сьогодні</span>
        </a>
        <a routerLink="/important" routerLinkActive="active" class="nav-link">
            <span class="material-symbols-outlined">star</span>
            <span>Важливі</span>
        </a>
        <a routerLink="/planned" routerLinkActive="active" class="nav-link">
            <span class="material-symbols-outlined">calendar_month</span>
            <span>Заплановані</span>
        </a>
        <a routerLink="/tasks" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
            <span class="material-symbols-outlined">list_alt</span>
            <span>Усі задачі</span>
        </a>
        <a routerLink="/completed" routerLinkActive="active" class="nav-link">
            <span class="material-symbols-outlined">task_alt</span>
            <span>Виконані</span>
        </a>

        <hr class="mx-3" />
        <div class="px-3 py-1 text-muted small text-uppercase">Категорії</div>

        @for (category of categories(); track category.id) {
        <a routerLink="/tasks" [queryParams]="{ categoryId: category.id }" class="nav-link category-link">
            <span class="category-dot" [style.background-color]="category.color || '#605e5c'"></span>
            <span>{{ category.name }}</span>
        </a>
        }
    </nav>
</aside>
